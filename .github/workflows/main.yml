name: Build EXE

on: [push] # Startet jedes Mal, wenn du eine Datei hochlädst

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --icon="logo.ico" KA-V4.1.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: REM-Analyzer-EXE
        path: dist/KA-V4.1.exe
